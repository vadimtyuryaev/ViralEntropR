<!-- Primary metadata -->
<meta name="description"
  content="Empirical robustness study of Gaussian Mixture Model (GMM) site selection on SARS-CoV-2 Spike protein Shannon entropy distributions. Six monotone transformations — Log1p, Log1p∘Log1p, square root, reciprocal, Box-Cox, and log — are applied to GISAID and NCBI entropy vectors to demonstrate that GMM-based high-entropy site selection is invariant to data transformation and that the added methodological complexity is not warranted.">
